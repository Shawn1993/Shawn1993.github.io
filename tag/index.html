---
layout: default
title: Tags
---
<div class="taxonomy-layout">
    <aside class="taxonomy-sidebar">
        <div class="taxonomy-sidebar__title">标签</div>
        <ul class="taxonomy-sidebar__list">
            {% for tag in site.tags %}
            <li class="taxonomy-sidebar__item">
                <a href="#{{ tag[0] }}-ref">
                    {{ tag[0] }}
                    <span class="count">({{ tag[1].size }})</span>
                </a>
            </li>
            {% endfor %}
        </ul>
    </aside>
    <div class="taxonomy-page">
        {% for tag in site.tags %}
        <section class="taxonomy-section" id="{{ tag[0] }}-ref">
            <h2 class="taxonomy-section__title">{{ tag[0] }}</h2>
            <ul class="taxonomy-list">
                {% for post in tag[1] %}
                <li class="taxonomy-list__item">
                    <span class="taxonomy-list__date">{{ post.date | date: "%Y-%m-%d" }}</span>
                    <a class="taxonomy-list__link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
                </li>
                {% endfor %}
            </ul>
        </section>
        {% endfor %}
    </div>
</div>
