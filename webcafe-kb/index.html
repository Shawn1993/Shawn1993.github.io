<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebCafe 知识库</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafafa;
      --card-bg: #fff;
      --text: #1a1a1a;
      --text-secondary: #666;
      --border: #e5e5e5;
      --accent: #5c6bc0;
      --accent-light: #e8eaf6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }
    
    /* 列表视图 */
    #listView { max-width: 720px; margin: 0 auto; padding: 40px 20px; }
    
    .header {
      text-align: center;
      margin-bottom: 50px;
    }
    .header h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 2.5em;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .header p { color: var(--text-secondary); font-size: 1.1em; }
    .stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 25px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .stats strong { 
      font-size: 28px; 
      font-weight: 600;
      color: var(--text);
      display: block;
    }
    
    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
    }
    .search-bar input {
      flex: 1;
      padding: 14px 20px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-bar input:focus { border-color: var(--accent); }
    .search-bar select {
      padding: 14px 20px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      background: white;
      cursor: pointer;
    }
    
    .article-item {
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .article-item:hover { opacity: 0.7; }
    .article-item:first-child { padding-top: 0; }
    
    .article-category {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .article-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.35em;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 10px;
    }
    .article-excerpt {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .article-meta {
      display: flex;
      gap: 20px;
      margin-top: 14px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .article-meta span { display: flex; align-items: center; gap: 5px; }
    
    .load-more {
      display: block;
      width: 100%;
      padding: 16px;
      margin-top: 30px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: white;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .load-more:hover { background: var(--bg); }
    
    /* 文章详情视图 */
    #articleView {
      display: none;
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }
    #articleView.active { display: block; }
    #listView.hidden { display: none; }
    
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      font-size: 14px;
      color: var(--text-secondary);
      text-decoration: none;
      cursor: pointer;
      margin-bottom: 30px;
    }
    .back-btn:hover { color: var(--text); }
    
    .article-header {
      margin-bottom: 40px;
      padding-bottom: 30px;
      border-bottom: 1px solid var(--border);
    }
    .article-header .category {
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 16px;
    }
    .article-header h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 2em;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 20px;
    }
    .article-header .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .article-header .author {
      font-weight: 500;
      color: var(--text);
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    .tag {
      padding: 4px 12px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .article-content {
      font-family: 'Noto Serif SC', Georgia, serif;
      font-size: 17px;
      line-height: 1.9;
      color: #333;
    }
    .article-content p { margin-bottom: 1.5em; }
    .article-content img {
      max-width: 100%;
      border-radius: 8px;
      margin: 24px 0;
    }
    .article-content a { color: var(--accent); }
    
    .article-images {
      margin: 40px 0;
      padding: 30px;
      background: #f5f5f5;
      border-radius: 12px;
    }
    .article-images h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .image-grid img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .image-grid img:hover { transform: scale(1.02); }
    
    .comments-section {
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid var(--border);
    }
    .comments-section h3 {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.3em;
      margin-bottom: 30px;
    }
    .comment {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .comment:last-child { border-bottom: none; }
    .comment-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .comment-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 14px;
    }
    .comment-author {
      font-weight: 600;
      font-size: 14px;
    }
    .comment-text {
      font-size: 15px;
      line-height: 1.7;
      color: #444;
      padding-left: 52px;
    }
    
    .no-content {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-secondary);
    }
    
    /* 图片放大 */
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      cursor: zoom-out;
      justify-content: center;
      align-items: center;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }
    
    @media (max-width: 600px) {
      .header h1 { font-size: 1.8em; }
      .article-header h1 { font-size: 1.5em; }
      .stats { gap: 25px; }
      .stats strong { font-size: 22px; }
      .article-content { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div id="listView">
    <div class="header">
      <h1>WebCafe 知识库</h1>
      <p>哥飞社群精华内容存档</p>
      <div class="stats">
        <div><strong id="totalCount">-</strong>篇文章</div>
        <div><strong id="commentCount">-</strong>条评论</div>
      </div>
    </div>
    
    <div class="search-bar">
      <input type="text" id="search" placeholder="搜索文章...">
      <select id="categoryFilter">
        <option value="">全部</option>
        <option value="post">帖子</option>
        <option value="tutorial">教程</option>
        <option value="experience">经验</option>
      </select>
    </div>
    
    <div id="list"></div>
    <button class="load-more" id="loadMore" style="display:none">加载更多</button>
  </div>
  
  <div id="articleView">
    <a class="back-btn" onclick="showList()">← 返回列表</a>
    <article>
      <div class="article-header">
        <div class="category" id="articleCategory"></div>
        <h1 id="articleTitle"></h1>
        <div class="meta">
          <span class="author" id="articleAuthor"></span>
          <span id="articleDate"></span>
        </div>
        <div class="tags" id="articleTags"></div>
      </div>
      <div class="article-content" id="articleContent"></div>
      <div class="article-images" id="articleImages" style="display:none">
        <h3>📷 配图</h3>
        <div class="image-grid" id="imageGrid"></div>
      </div>
      <div class="comments-section" id="commentsSection" style="display:none">
        <h3>💬 评论 <span id="commentCountDetail"></span></h3>
        <div id="commentsList"></div>
      </div>
    </article>
  </div>
  
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg" src="">
  </div>

  <script>
    let data = [];
    let filtered = [];
    let displayed = 0;
    const PAGE_SIZE = 15;
    
    async function init() {
      const resp = await fetch('data.json');
      data = await resp.json();
      
      // 按时间排序
      data.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
      
      document.getElementById('totalCount').textContent = data.length;
      document.getElementById('commentCount').textContent = 
        data.reduce((a, d) => a + (d.comments?.length || 0), 0);
      
      filtered = [...data];
      displayed = 0;
      renderMore();
    }
    
    function renderMore() {
      const items = filtered.slice(displayed, displayed + PAGE_SIZE);
      const list = document.getElementById('list');
      
      if (displayed === 0 && items.length === 0) {
        list.innerHTML = '<div class="no-content">没有找到相关内容</div>';
        document.getElementById('loadMore').style.display = 'none';
        return;
      }
      
      const html = items.map((item, i) => {
        const idx = displayed + i;
        const excerpt = (item.markdown || '').slice(0, 120).replace(/\n/g, ' ');
        return `
          <div class="article-item" onclick="showArticle(${idx})">
            <div class="article-category">${item.categoryName || '帖子'}</div>
            <div class="article-title">${escapeHtml(item.title || item.uid)}</div>
            <div class="article-excerpt">${escapeHtml(excerpt)}...</div>
            <div class="article-meta">
              <span>${escapeHtml(item.userName || '匿名')}</span>
              <span>${item.createdAt?.slice(0, 10) || ''}</span>
              ${item.comments?.length ? `<span>💬 ${item.comments.length}</span>` : ''}
              ${item.images?.length ? `<span>🖼 ${item.images.length}</span>` : ''}
            </div>
          </div>
        `;
      }).join('');
      
      if (displayed === 0) {
        list.innerHTML = html;
      } else {
        list.innerHTML += html;
      }
      
      displayed += items.length;
      document.getElementById('loadMore').style.display = 
        displayed < filtered.length ? 'block' : 'none';
    }
    
    function filter() {
      const q = document.getElementById('search').value.toLowerCase();
      const cat = document.getElementById('categoryFilter').value;
      
      filtered = data.filter(item => {
        if (cat && item.category !== cat) return false;
        if (q) {
          const text = (item.title || '') + (item.markdown || '');
          if (!text.toLowerCase().includes(q)) return false;
        }
        return true;
      });
      
      displayed = 0;
      document.getElementById('list').innerHTML = '';
      renderMore();
    }
    
    function showArticle(idx) {
      const item = filtered[idx];
      
      document.getElementById('articleCategory').textContent = item.categoryName || '帖子';
      document.getElementById('articleTitle').textContent = item.title || item.uid;
      document.getElementById('articleAuthor').textContent = item.userName || '匿名';
      document.getElementById('articleDate').textContent = item.createdAt?.slice(0, 10) || '';
      
      // 标签
      const tagsEl = document.getElementById('articleTags');
      if (item.tags?.length) {
        tagsEl.innerHTML = item.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
        tagsEl.style.display = 'flex';
      } else {
        tagsEl.style.display = 'none';
      }
      
      // 内容 - 转换为段落
      const content = (item.markdown || '无内容').split(/\n\n+/).map(p => 
        `<p>${escapeHtml(p.trim())}</p>`
      ).join('');
      document.getElementById('articleContent').innerHTML = content;
      
      // 图片
      const imagesEl = document.getElementById('articleImages');
      if (item.images?.length) {
        document.getElementById('imageGrid').innerHTML = item.images.map(src =>
          `<img src="${escapeHtml(src)}" onclick="openLightbox(event, '${escapeHtml(src)}')" onerror="this.style.display='none'" loading="lazy">`
        ).join('');
        imagesEl.style.display = 'block';
      } else {
        imagesEl.style.display = 'none';
      }
      
      // 评论
      const commentsEl = document.getElementById('commentsSection');
      if (item.comments?.length) {
        document.getElementById('commentCountDetail').textContent = `(${item.comments.length})`;
        document.getElementById('commentsList').innerHTML = item.comments.map(c => `
          <div class="comment">
            <div class="comment-header">
              <div class="comment-avatar">${(c.author || '?')[0]}</div>
              <div class="comment-author">${escapeHtml(c.author || '匿名')}</div>
            </div>
            <div class="comment-text">${escapeHtml(c.text)}</div>
          </div>
        `).join('');
        commentsEl.style.display = 'block';
      } else {
        commentsEl.style.display = 'none';
      }
      
      document.getElementById('listView').classList.add('hidden');
      document.getElementById('articleView').classList.add('active');
      window.scrollTo(0, 0);
      history.pushState({ article: idx }, '', `#${item.uid}`);
    }
    
    function showList() {
      document.getElementById('articleView').classList.remove('active');
      document.getElementById('listView').classList.remove('hidden');
      history.pushState({}, '', location.pathname);
    }
    
    function openLightbox(e, src) {
      e.stopPropagation();
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('active');
    }
    
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    
    document.getElementById('search').addEventListener('input', filter);
    document.getElementById('categoryFilter').addEventListener('change', filter);
    document.getElementById('loadMore').addEventListener('click', renderMore);
    
    window.addEventListener('popstate', () => {
      if (location.hash) {
        const uid = location.hash.slice(1);
        const idx = filtered.findIndex(d => d.uid === uid);
        if (idx >= 0) showArticle(idx);
      } else {
        showList();
      }
    });
    
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeLightbox();
        if (document.getElementById('articleView').classList.contains('active')) {
          showList();
        }
      }
    });
    
    init().then(() => {
      if (location.hash) {
        const uid = location.hash.slice(1);
        const idx = filtered.findIndex(d => d.uid === uid);
        if (idx >= 0) showArticle(idx);
      }
    });
  </script>
</body>
</html>
