<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title and page.title != "home" %}{{ page.title }} - {{ site.name }}{% else %}{{ site.name }}{% endif %}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.meta_description }}{% endif %}">
    <link rel="shortcut icon" href="{{ '/styles/images/favicon.png' | prepend: site.baseurl }}">
    <link rel="icon" href="{{ '/styles/images/favicon.png' | prepend: site.baseurl }}">
    <link rel="apple-touch-icon" href="{{ '/styles/images/apple-touch-icon.png' | prepend: site.baseurl }}">
    <link rel="stylesheet" href="{{ '/styles/css/main.css' | prepend: site.baseurl }}">
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }}" href="{{ '/feed.xml' | prepend: site.baseurl }}">
    <!--mathjax-->
    <script type="text/x-mathjax-config">
        MathJax.Hub.Config({ tex2jax: { inlineMath: [['$','$'], ["\\(","\\)"]], processEscapes: true }, TeX: { equationNumbers: { autoNumber: "AMS" } }, messageStyle: "none", SVG: { blacker: 1 }});
    </script>
    <script src="{{ '/styles/js/mathjax-bind.js' | prepend: site.baseurl }}"></script>
    <script src="{{ '/styles/js/mathjax.js' | prepend: site.baseurl }}"></script>
    <script>
    var _hmt = _hmt || [];
    (function() {
        var hm = document.createElement("script");
        hm.src = "//hm.baidu.com/hm.js?94be4b0f9fc5d94cc0d0415ea6761ae9";
        var s = document.getElementsByTagName("script")[0];
        s.parentNode.insertBefore(hm, s);
    })();
    </script>
</head>
